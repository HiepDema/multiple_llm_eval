# Benchmark matrix: 5 small models (<= 2B) x 5 compact benchmarks = 25 tests.
#
# Everything runs on one Ollama server (http://localhost:11434):
#   - On a GPU box (e.g. Lambda A10): run Ollama there, then either run this
#     script on the box, or from your laptop through an SSH tunnel:
#       ssh -L 11434:localhost:11434 ubuntu@<lambda-ip>
#   - Locally on CPU it also works, just slowly (and use a cloud judge instead
#     of qwen2.5:14b, which won't fit in small RAM).
#
# api styles:
#   simple      - POST {base_url} with {"prompt": ...}, expects {"output": ...}
#   openai-chat - POST {base_url}/v1/chat/completions (Ollama, llama.cpp,
#                 vLLM, LM Studio, or any OpenAI-compatible server)
# Optional per entry: api_key: "..." or api_key_env: ENV_VAR_NAME

evaluator:
  base_url: "http://localhost:11434"
  api: openai-chat
  model: "qwen2.5:14b"   # judge — much stronger than the 2B testers; ~9GB VRAM on the A10

models:
  - name: "Qwen2.5-0.5B"
    base_url: "http://localhost:11434"
    api: openai-chat
    model: "qwen2.5:0.5b"
  - name: "Llama-3.2-1B"
    base_url: "http://localhost:11434"
    api: openai-chat
    model: "llama3.2:1b"
  - name: "Gemma-3-1B"
    base_url: "http://localhost:11434"
    api: openai-chat
    model: "gemma3:1b"
  - name: "Qwen2.5-1.5B"
    base_url: "http://localhost:11434"
    api: openai-chat
    model: "qwen2.5:1.5b"
  - name: "SmolLM2-1.7B"
    base_url: "http://localhost:11434"
    api: openai-chat
    model: "smollm2:1.7b"

benchmarks:
  - name: "General Knowledge"
    file: "benchmarks/general_knowledge.jsonl"
    criteria: ["Correctness", "Relevance", "Clarity"]
  - name: "Math"
    file: "benchmarks/math.jsonl"
    criteria: ["Accuracy", "Reasoning", "Clarity"]
  - name: "Reasoning"
    file: "benchmarks/reasoning.jsonl"
    criteria: ["Logical Soundness", "Correctness", "Clarity"]
  - name: "Vietnamese"
    file: "benchmarks/vietnamese.jsonl"
    criteria: ["Correctness", "Vietnamese Fluency", "Clarity"]
  - name: "Medical"
    file: "benchmarks/medical.jsonl"
    criteria: ["Accuracy", "Faithfulness", "Clarity"]

# Used when a benchmark omits its own criteria
global_criteria: ["Correctness", "Clarity"]

output_dir: "results"
